spring.application.name=feita_debronze

# --- Configuraçăo do Banco de Dados MySQL ---
# A opçăo 'createDatabaseIfNotExist=true' cria o banco 'db_bronze' se ele năo existir.
# 'allowPublicKeyRetrieval=true' é adicionado para resolver o erro "Public Key Retrieval is not allowed".
spring.datasource.url=jdbc:mysql://localhost:3306/db_bronze?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=L@is02042021
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuraçăo do JPA (Hibernate) ---
# 'update': Cria as tabelas se năo existirem e atualiza o esquema se houver alteraçőes nas entidades.
# Use 'create' se quiser apagar e recriar o banco toda vez que iniciar a aplicaçăo (cuidado com dados em produçăo).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Configuraçăo do Servidor ---
server.port=8090

