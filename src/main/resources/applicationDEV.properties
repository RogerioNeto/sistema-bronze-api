spring.application.name=feita_debronze

# Configura para MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_bronze?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=L@is02042021

# O segredo para criar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# --- Configura do Servidor ---
server.port=8090

# Limita o número de conexões simultâneas do pool
spring.datasource.hikari.maximum-pool-size=3
# Tempo mínimo que uma conexão pode ficar ociosa antes de ser liberada
spring.datasource.hikari.idle-timeout=10000
# Tempo máximo que o Spring espera por uma conexão antes de dar erro
spring.datasource.hikari.connection-timeout=20000
# Tempo máximo de vida de uma conexão no pool
spring.datasource.hikari.max-lifetime=1800000